<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#14532d">
<title>ワクワクIT探検隊</title>
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<style>
:root{--g:#22c55e;--gd:#14532d;--y:#facc15;--br:#4b2e13;--sh:0 18px 50px rgba(20,83,45,.22)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#24311f;background:linear-gradient(145deg,#a7f3d0,#67e8f9 52%,#86efac)}body{padding:14px}button,input{font:inherit}button{width:100%;border:0;border-radius:18px;padding:16px;margin-top:10px;font-size:17px;font-weight:900;cursor:pointer;touch-action:manipulation}.app{max-width:460px;min-height:calc(100vh - 28px);margin:auto;position:relative;overflow:hidden;border-radius:32px;border:3px solid rgba(255,255,255,.7);background:linear-gradient(180deg,rgba(255,255,255,.96),rgba(255,248,231,.98));box-shadow:var(--sh)}.screen{position:relative;z-index:1;min-height:calc(100vh - 28px);padding:22px 18px 18px;display:flex;flex-direction:column;animation:fade .25s ease}@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}.leaf{position:absolute;font-size:82px;opacity:.16;pointer-events:none;animation:float 5s ease-in-out infinite}.l1{top:-20px;left:-20px}.l2{top:120px;right:-35px}.l3{bottom:-25px;left:-20px}@keyframes float{50%{translate:0 8px}}.pill{display:inline-flex;justify-content:center;margin:0 auto 12px;padding:7px 14px;border-radius:999px;background:#dcfce7;border:2px solid #86efac;color:#15803d;font-size:13px;font-weight:900}h1,h2,p{margin:0}h1{text-align:center;color:var(--br);font-size:clamp(30px,8vw,42px);line-height:1.12}h2{text-align:center;color:var(--br);font-size:25px;margin-bottom:10px}p{line-height:1.75}.hero,.story{flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center}.hero-icon{font-size:88px;margin:18px 0;animation:pop 1.4s ease-in-out infinite}@keyframes pop{50%{transform:scale(1.045)}}.glass{background:rgba(255,255,255,.82);border:2px solid rgba(34,197,94,.18);border-radius:24px;padding:16px;margin:16px 0;box-shadow:0 8px 22px rgba(20,83,45,.08)}.rules{display:grid;gap:10px;margin-top:14px;text-align:left}.rule{display:flex;gap:10px;background:#f0fdf4;padding:10px;border-radius:16px;font-weight:800;color:#25512e}.rule span{width:28px;height:28px;display:grid;place-items:center;border-radius:50%;background:var(--y);color:#78350f;flex:0 0 auto}.primary{background:linear-gradient(#34d399,#16a34a);color:#fff;box-shadow:0 7px 0 #15803d}.secondary{background:#fef3c7;color:#7c2d12;box-shadow:0 5px 0 #f59e0b}.ghost{background:rgba(255,255,255,.84);color:#49604a;border:2px solid rgba(20,83,45,.12)}.danger{background:#ef4444;color:#fff;box-shadow:0 5px 0 #b91c1c}.scene{position:relative;height:280px;border-radius:28px;overflow:hidden;background:linear-gradient(#d9f99d,#4ade80);border:4px solid rgba(255,255,255,.72);box-shadow:0 14px 28px rgba(20,83,45,.18);margin:8px 0 18px}.scene:after{content:"";position:absolute;left:0;right:0;bottom:0;height:42%;background:linear-gradient(#5b7d2b,#365314)}.forest-left,.forest-right{position:absolute;top:0;bottom:0;width:48%;background:radial-gradient(circle at 40% 15%,#166534 0 16%,transparent 17%),radial-gradient(circle at 60% 30%,#15803d 0 18%,transparent 19%),linear-gradient(90deg,#14532d,#166534);z-index:2}.forest-left{left:0;animation:openL 7s ease forwards}.forest-right{right:0;animation:openR 7s ease forwards}@keyframes openL{to{transform:translateX(-92%)}}@keyframes openR{to{transform:translateX(92%)}}.path{position:absolute;left:50%;bottom:0;width:110px;height:190px;transform:translateX(-50%) perspective(220px) rotateX(58deg);transform-origin:bottom;background:linear-gradient(#fde68a,#d6a56f);z-index:1}.scene-text{position:absolute;left:14px;right:14px;bottom:14px;z-index:5;background:rgba(255,255,255,.92);border-radius:18px;padding:12px;font-weight:900;color:#14532d;opacity:0;animation:textIn .7s ease 5.8s forwards}@keyframes textIn{to{opacity:1;transform:translateY(-4px)}}.log-pile{position:absolute;left:50%;top:72px;transform:translateX(-50%);z-index:4;font-size:56px;letter-spacing:-16px;animation:shake .6s ease 1s 3,logsFall 1.5s ease 2.5s forwards}@keyframes shake{25%{transform:translateX(-52%) rotate(-3deg)}75%{transform:translateX(-48%) rotate(3deg)}}@keyframes logsFall{to{transform:translate(-50%,150px) rotate(22deg);opacity:0}}.river{position:absolute;left:0;right:0;bottom:0;height:54%;background:linear-gradient(#38bdf8,#0369a1);z-index:2}.sun-drop{position:absolute;left:50%;bottom:24px;z-index:4;font-size:64px;transform:translateX(-50%);animation:up 3s ease 1.2s forwards,glow 1s ease-in-out infinite}@keyframes up{to{bottom:142px}}@keyframes glow{50%{filter:drop-shadow(0 0 18px #fde047);transform:translateX(-50%) scale(1.08)}}.boss{position:absolute;left:50%;top:50px;transform:translateX(-50%);z-index:3;font-size:96px;animation:bossHit 2.8s ease 2.2s forwards}@keyframes bossHit{35%{transform:translateX(-50%) scale(1.16)}100%{transform:translate(240px,-120px) rotate(30deg);opacity:0}}.energy{position:absolute;left:32px;bottom:62px;width:68px;height:68px;z-index:5;border-radius:50%;background:radial-gradient(circle,#fff 0 12%,#fde047 20%,#f59e0b 56%,transparent 60%);box-shadow:0 0 26px #facc15;animation:blast 2.2s ease 1.4s forwards}@keyframes blast{50%{transform:translate(140px,-60px) scale(1.3)}100%{transform:translate(210px,-96px) scale(1.8);opacity:0}}.next-box{background:#fff7ed;border:2px solid #fed7aa;border-radius:20px;padding:14px;margin:14px 0;color:#9a3412;font-weight:900;text-align:center}.topline{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}.counter{padding:8px 12px;border-radius:999px;background:#fff7ed;border:2px solid #fed7aa;color:#c2410c;font-weight:900}.mission-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0}.mission-card{min-height:138px;border-radius:22px;border:4px solid #e7e5df;background:linear-gradient(#fff,#f8f5ec);display:grid;place-items:center;text-align:center;padding:12px;filter:grayscale(1);opacity:.62}.mission-card.done{filter:none;opacity:1;transform:translateY(-2px)}.jungle.done{background:linear-gradient(160deg,#dcfce7,#86efac);border-color:#22c55e}.log.done{background:linear-gradient(160deg,#fef3c7,#d6a56f);border-color:#92400e}.sun.done{background:linear-gradient(160deg,#fff7c2,#facc15);border-color:#f59e0b}.boss-card.done{background:linear-gradient(160deg,#fecaca,#f87171);border-color:#dc2626}.mission-icon{font-size:52px}.mission-name{font-size:18px;font-weight:900;color:#4b2e13}.mission-sub{font-size:12px;font-weight:800;color:#64715f;margin-top:4px}.staff-panel{display:none;margin-top:12px;padding:14px;border-radius:22px;background:#fff7ed;border:2px solid #fed7aa}.staff-panel.show{display:block}.staff-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.staff-grid button{margin-top:0;padding:13px;font-size:14px;background:#ffedd5;color:#9a3412;border:2px solid #fdba74}.staff-grid button.done{background:#dcfce7;color:#166534;border-color:#86efac}.modal{display:none;position:fixed;inset:0;z-index:20;background:rgba(20,30,18,.8);padding:16px;align-items:center;justify-content:center}.modal.show{display:flex}.scanner{width:100%;max-width:450px;border-radius:28px;background:#fffef5;padding:18px;border:3px solid rgba(255,255,255,.8)}#reader{width:100%;min-height:290px;border-radius:22px;overflow:hidden;background:#111;border:4px solid #bbf7d0}.scan-note{background:#f0fdf4;border:2px solid #bbf7d0;border-radius:18px;padding:12px;margin:10px 0 14px;font-weight:800;color:#166534;line-height:1.65}.name-input{width:100%;border:3px solid #bbf7d0;border-radius:20px;padding:16px;font-size:20px;text-align:center;font-weight:900;color:#14532d;outline:none;background:#fff;margin:14px 0}.certificate{margin:18px 0;padding:24px 16px;border-radius:28px;background:linear-gradient(#fffdf0,#fef3c7);border:5px solid #facc15;text-align:center}.cert-label{display:inline-block;padding:6px 14px;border-radius:999px;background:#16a34a;color:#fff;font-weight:900;margin-bottom:12px}.cert-title{color:#92400e;font-size:32px;font-weight:900}.cert-name{display:inline-block;font-size:29px;font-weight:900;color:#14532d;border-bottom:4px solid #facc15;padding:4px 18px 6px;margin:14px 0}.stamp{margin:16px auto 0;width:92px;height:92px;border-radius:50%;border:5px solid #ef4444;color:#ef4444;display:grid;place-items:center;font-weight:900;transform:rotate(-10deg)}.confetti{position:absolute;inset:0;overflow:hidden;pointer-events:none}.confetti span{position:absolute;top:-30px;width:10px;height:18px;border-radius:3px;animation:fall 2.8s linear infinite}@keyframes fall{to{transform:translateY(110vh) rotate(360deg)}}.footer{margin:auto -18px -18px;padding:15px 18px;text-align:center;background:#dcfce7;color:#166534;font-size:13px;font-weight:900}@media(max-width:360px){body{padding:8px}.app,.screen{min-height:calc(100vh - 16px)}.screen{padding:18px 14px 14px}.scene{height:245px}.mission-card{min-height:122px}.mission-icon{font-size:44px}}
</style>
</head>
<body>
<main class="app"><div class="leaf l1">🌿</div><div class="leaf l2">🍃</div><div class="leaf l3">🌱</div><section id="screen" class="screen"></section></main>
<div id="scannerModal" class="modal"><div class="scanner"><div class="pill">📷 ミッションQR</div><h2>QRコードを読み取ろう</h2><div class="scan-note">ミッションに成功したら、スタッフが案内するQRコードをカメラに写してね。</div><div id="reader"></div><button class="danger" onclick="closeScanner()">カメラを閉じる</button></div></div>
<script>
const missions = [
  {
    id: "log",
    name: "丸太をどけろ",
    emoji: "🪵",
    qr: "LOG",
    before: "目の前に大きな丸太が！缶を倒して道を開けよう！",
    success: "大成功！丸太をどかして先へ進めるぞ。…ああっ！『太陽のしずく』が川の底へ！",
    next: "ヨーヨー釣りブースへ移動しよう！",
    scene: "log"
  },
  {
    id: "sun",
    name: "太陽のしずく",
    emoji: "☀️",
    qr: "SUN_DROP",
    before: "川に落ちた『太陽のしずく』を、沈む前に救い上げよう！",
    success: "すごい！太陽のしずくをゲットしたぞ！このエネルギーを溜めて、いざボスバトルだ！",
    next: "大画面モニターのボタン連打へ！",
    scene: "sun"
  },
  {
    id: "boss",
    name: "ボスバトル",
    emoji: "👹",
    qr: "BOSS",
    before: "最後の戦い！ボタンを連打してボスを倒そう！",
    success: "やったー！ボスを倒したぞ！おめでとう！ご褒美をもらいに行こう！",
    next: "お菓子・お絵描きブース、写真撮影へ！",
    scene: "boss"
  }
];
let completed=JSON.parse(localStorage.getItem("wakuwaku_v2_completed")||"[]"),playerName=localStorage.getItem("wakuwaku_v2_name")||"",qrScanner=null,scanning=false,staffMode=false,staffTapCount=0,staffTapTimer=null;
const screen=document.getElementById("screen"),scannerModal=document.getElementById("scannerModal");
function save(){localStorage.setItem("wakuwaku_v2_completed",JSON.stringify(completed));localStorage.setItem("wakuwaku_v2_name",playerName)}
function esc(t){return String(t).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function renderStart() {
  screen.innerHTML = `
    <div class="hero">
      <div class="pill">🌿 わくなつスペシャル 🌿</div>

      <h1 onclick="secretStaffTap()">
        ワクワクIT探検隊
        <br>
        <span style="font-size:.58em">
          ～ジャングルのボスを倒せ！～
        </span>
      </h1>

      <div class="hero-icon">📱🌴🧭</div>

      <div class="glass">
        <p>
          <strong>
            スマホとリアルな遊びがつながるジャングル冒険ゲーム！
          </strong>
        </p>

        <div class="rules">
          <div class="rule">
            <span>1</span>
            <div>各ブースのミッションに挑戦</div>
          </div>

          <div class="rule">
            <span>2</span>
            <div>成功したらQRコードを読み取る</div>
          </div>

          <div class="rule">
            <span>3</span>
            <div>ストーリーを進めてボスを倒す</div>
          </div>
        </div>
      </div>

      <button class="primary" onclick="renderOpening()">
        探検スタート！
      </button>

      <button class="ghost" onclick="resetGame()">
        最初からやり直す
      </button>

      <button
        onclick="openStaffMode()"
        style="
          width:auto;
          margin:20px auto 0;
          padding:8px 14px;
          font-size:12px;
          opacity:0.15;
          background:transparent;
          box-shadow:none;
        "
      >
        管理
      </button>
    </div>
  `;
}
function renderOpening(){
  screen.innerHTML = `
    <div class="story">
      <div class="pill">🎬 オープニング</div>

      <h2>ジャングルの奥へ進もう</h2>

      <div class="scene">
        <div class="forest-left"></div>
        <div class="forest-right"></div>
        <div class="path"></div>

        <div class="scene-text">
          ザサザサ…木々をかき分けて、ジャングルの奥へ！
        </div>
      </div>

      <div class="glass">
        <p><strong>ジャングルへようこそ！</strong></p>
        <p>悪いボスを倒しに行こう！</p>
        <p style="margin-top:10px">
          …ああっ！目の前に大きな丸太が！
        </p>
      </div>

      <button class="primary" onclick="renderMissionHub()">
        缶倒しブースへGO！
      </button>
    </div>
  `;
}
function renderMissionHub(){const remaining=missions.length-completed.length,complete=remaining===0;screen.innerHTML=`<div class="topline"><div style="font-weight:900;color:#166534">🌴 ジャングル探検中</div><div class="counter">${completed.length}/${missions.length} クリア</div></div><h2>ミッションマップ</h2><div class="mission-grid">${missions.map((m,i)=>{const d=completed.includes(m.id),c=i===completed.length;return `<div class="mission-card ${m.id==='boss'?'boss-card':m.id} ${d?'done':''}"><div><div class="mission-icon">${m.emoji}</div><div class="mission-name">${m.name}</div><div class="mission-sub">${d?'クリア！':c?'次のミッション':'まだ進めない'}</div></div></div>`}).join('')}</div>${complete?`<div class="next-box">🎉 すべてのミッションをクリア！</div><button class="primary" onclick="renderCertificateForm()">認定証を作る</button>`:`<div class="glass"><p><strong>${missions[completed.length].before}</strong></p></div><button class="primary" onclick="openScanner()">📷 成功したらQRを読み取る</button>`}<div class="staff-panel ${staffMode?'show':''}"><h3 style="margin:0 0 10px;text-align:center;color:#c2410c">スタッフ管理</h3><div class="staff-grid">${missions.map(m=>{const d=completed.includes(m.id);return `<button class="${d?'done':''}" onclick="staffToggle('${m.id}')">${m.emoji} ${m.name}<br>${d?'登録済み':'登録する'}</button>`}).join('')}</div><p style="font-size:12px;text-align:center;color:#9a3412;font-weight:800;margin-top:10px">QRが反応しない場合だけ、順番に登録してください。</p><button class="ghost" onclick="staffMode=false;renderMissionHub()">スタッフ管理を閉じる</button></div><button class="ghost" onclick="renderStart()">トップに戻る</button><div class="footer">タイトルを5回連続タップするとスタッフ管理を開けます</div>`}
function sceneHtml(s){if(s==='log')return `<div class="scene"><div class="path"></div><div class="log-pile">🪵🪵🪵</div><div class="scene-text">ガラガラガッシャーン！丸太が崩れて道が開いた！</div></div>`;if(s==='sun')return `<div class="scene"><div class="river"></div><div class="sun-drop">☀️</div><div class="scene-text">ザバーン！太陽のしずくを救い上げた！</div></div>`;if(s==='boss')return `<div class="scene"><div class="boss">👹</div><div class="energy"></div><div class="scene-text">元気玉がボスに直撃！ボスは降参した！</div></div>`;return `<div class="scene"><div class="forest-left"></div><div class="forest-right"></div><div class="path"></div><div class="scene-text">ジャングルの奥へ進もう！</div></div>`}
function renderSuccess(m){screen.innerHTML=`<div class="story"><div class="pill">✨ ミッションクリア ✨</div><h2>${m.name}</h2>${sceneHtml(m.scene)}<div class="glass"><p><strong>${m.success}</strong></p></div><div class="next-box">${m.next}</div><button class="primary" onclick="renderMissionHub()">${m.id==='boss'?'認定証へ進む':'次のミッションへ'}</button></div>`}
function openScanner(){scannerModal.classList.add('show');if(!window.Html5Qrcode){alert('QR読み取りの準備ができませんでした。');closeScanner();return}if(scanning)return;qrScanner=new Html5Qrcode('reader');scanning=true;qrScanner.start({facingMode:'environment'},{fps:10,qrbox:{width:250,height:250},aspectRatio:1},txt=>{const m=findMission(txt);if(!m){alert('このQRコードは今回のミッション用ではありません。');return}completeMission(m);closeScanner()},()=>{}).catch(()=>{alert('カメラを起動できませんでした。httpsのURLで開き、カメラ許可をオンにしてください。');closeScanner()})}
function closeScanner(){scannerModal.classList.remove('show');if(qrScanner&&scanning){qrScanner.stop().then(()=>{qrScanner.clear();qrScanner=null;scanning=false}).catch(()=>{qrScanner=null;scanning=false})}else{qrScanner=null;scanning=false}}
function findMission(t){const c=String(t).trim().toUpperCase();return missions.find(m=>c===m.qr||c.includes(m.qr))}
function completeMission(m){const expected=missions[completed.length];if(completed.includes(m.id)){alert('このミッションはすでにクリアしています。');return}if(!expected||expected.id!==m.id){alert('順番が違います。次は「'+(expected?expected.name:'完了')+'」です。');return}completed.push(m.id);save();renderSuccess(m)}
function secretStaffTap() {
  staffTapCount++;

  clearTimeout(staffTapTimer);

  staffTapTimer = setTimeout(() => {
    staffTapCount = 0;
  }, 3000);

  if (staffTapCount >= 5) {
    staffTapCount = 0;
    clearTimeout(staffTapTimer);

    staffMode = true;

    alert("スタッフ管理画面を開きます");

    renderMissionHub();
  }
}


function openStaffMode() {
  const password = prompt("スタッフ用パスワードを入力してください");

  if (password === "2026") {
    staffMode = true;
    renderMissionHub();
  } else if (password !== null) {
    alert("パスワードが違います");
  }
}
function staffToggle(id){const m=missions.find(x=>x.id===id);if(!m)return;if(completed.includes(id)){const idx=missions.findIndex(x=>x.id===id);completed=completed.filter(done=>missions.findIndex(x=>x.id===done)<idx)}else{const expected=missions[completed.length];if(!expected||expected.id!==id){alert('順番に登録してください。次は「'+(expected?expected.name:'完了')+'」です。');return}completed.push(id)}save();renderMissionHub()}
function renderCertificateForm(){screen.innerHTML=`<div class="pill">🏆 認定証づくり</div><h1>探検隊の名前を<br>入れよう</h1><div class="hero-icon" style="text-align:center">✍️</div><div class="glass"><p>名前を入力すると、きみだけの認定証が完成するよ。</p></div><input id="nameInput" class="name-input" maxlength="12" placeholder="なまえ" value="${esc(playerName)}"><button class="primary" onclick="createCertificate()">認定証を表示</button><button class="ghost" onclick="renderMissionHub()">戻る</button>`}
function createCertificate(){const i=document.getElementById('nameInput');playerName=i.value.trim()||'探検隊';save();renderCertificate()}
function renderCertificate(){screen.innerHTML=`<div class="pill">🌿 ワクワクIT探検隊</div><h1>探検認定証</h1><div class="certificate"><div class="cert-label">MISSION COMPLETE</div><div class="cert-title">ジャングル探検認定証</div><p>あなたは3つのミッションをクリアし、<br>ジャングルのボスを倒しました。</p><div class="cert-name">${esc(playerName)}</div><p>すばらしい勇気とチャレンジする力を<br>ここに認定します。</p><p style="font-size:34px;margin-top:12px">🪵 ☀️ 👹</p><div class="stamp">認定</div></div><button class="primary" onclick="renderClear()">クリア画面へ</button><button class="secondary" onclick="renderCertificateForm()">名前を変更</button>`}
function renderClear(){const colors=['#facc15','#22c55e','#38bdf8','#fb923c','#f472b6'];screen.innerHTML=`<div class="confetti">${Array.from({length:28}).map((_,i)=>`<span style="left:${Math.random()*100}%;animation-delay:${Math.random()*2}s;background:${colors[i%colors.length]}"></span>`).join('')}</div><div class="hero"><div class="pill">🎉 ミッション完了 🎉</div><h1>ゲーム<br>クリア！</h1><div class="hero-icon">🏆</div><div class="glass"><h2>${esc(playerName)}</h2><p>ジャングルのボスを倒したぞ！</p><p style="margin-top:10px"><strong>お菓子・お絵描きブースへ行って、最後に写真を撮ろう！</strong></p></div><button class="primary" onclick="renderStart()">トップに戻る</button><button class="ghost" onclick="resetGame()">最初からやり直す</button>
 </div>`}
function resetGame(){if(!confirm('ゲームを最初からやり直す？'))return;completed=[];playerName='';staffMode=false;save();renderStart()}
renderStart();
</script>
</body>
</html>
