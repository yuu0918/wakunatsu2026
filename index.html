<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#14532d">
  <title>ワクワクIT<ruby>探検隊<rt>たんけんたい</rt></ruby></title>

  <!-- QR読み取り。カメラはGitHub PagesなどのHTTPS上で使用してください。 -->
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

  <style>
    :root {
      --green: #22c55e;
      --green-dark: #14532d;
      --green-mid: #166534;
      --green-light: #dcfce7;
      --yellow: #facc15;
      --orange: #fb923c;
      --red: #ef4444;
      --cream: #fff8e7;
      --brown: #4b2e13;
      --ink: #24311f;
      --white: #fffefa;
      --shadow: 0 18px 50px rgba(20, 83, 45, 0.22);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 13% 8%, rgba(255,255,255,.60), transparent 23%),
        radial-gradient(circle at 88% 18%, rgba(250,204,21,.28), transparent 20%),
        linear-gradient(145deg, #a7f3d0, #67e8f9 52%, #86efac);
    }

    body {
      padding: 14px;
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 16px;
      margin-top: 10px;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform .14s ease, filter .14s ease, box-shadow .14s ease;
    }

    button:active {
      transform: translateY(3px);
      filter: brightness(.98);
    }

    .app {
      width: 100%;
      max-width: 460px;
      min-height: calc(100vh - 28px);
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      border-radius: 32px;
      border: 3px solid rgba(255,255,255,.72);
      background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,248,231,.98));
      box-shadow: var(--shadow);
    }

    .app::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 8% 15%, rgba(34,197,94,.12), transparent 24%),
        radial-gradient(circle at 94% 84%, rgba(250,204,21,.14), transparent 24%);
      pointer-events: none;
    }

    .leaf {
      position: absolute;
      z-index: 0;
      font-size: 82px;
      opacity: .17;
      animation: leafFloat 5s ease-in-out infinite;
      pointer-events: none;
    }

    .leaf.one {
      top: -24px;
      left: -22px;
      transform: rotate(-20deg);
    }

    .leaf.two {
      top: 110px;
      right: -36px;
      transform: rotate(28deg);
      animation-delay: 1.1s;
    }

    .leaf.three {
      bottom: -30px;
      left: -24px;
      transform: rotate(18deg);
      animation-delay: .6s;
    }

    @keyframes leafFloat {
      0%, 100% { translate: 0 0; }
      50% { translate: 0 8px; }
    }

    .screen {
      position: relative;
      z-index: 1;
      min-height: calc(100vh - 28px);
      padding: 22px 18px 78px;
      display: flex;
      flex-direction: column;
      animation: screenIn .25s ease;
    }

    @keyframes screenIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: none;
      }
    }

    .admin-button {
      position: absolute;
      top: auto;
      left: auto;
      right: 12px;
      bottom: 12px;
      z-index: 8;
      width: 64px;
      height: 40px;
      margin: 0;
      padding: 0;
      border-radius: 14px;
      background: #fff7ed;
      color: #9a3412;
      border: 2px solid #fdba74;
      box-shadow: 0 4px 0 #fb923c;
      font-size: 14px;
      line-height: 1;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin: 0 auto 12px;
      padding: 7px 14px;
      border-radius: 999px;
      background: rgba(220,252,231,.92);
      border: 2px solid rgba(34,197,94,.26);
      color: #15803d;
      font-size: 13px;
      font-weight: 900;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      text-align: center;
      color: var(--brown);
      font-size: clamp(30px, 8vw, 42px);
      line-height: 1.12;
    }

    h2 {
      text-align: center;
      color: var(--brown);
      font-size: 25px;
      margin-bottom: 10px;
    }

    p {
      line-height: 1.75;
    }

    .hero,
    .story {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
    }

    .hero-icon {
      font-size: 88px;
      margin: 18px 0;
      animation: pop 1.4s ease-in-out infinite;
      filter: drop-shadow(0 8px 0 rgba(20,83,45,.08));
    }

    @keyframes pop {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.045); }
    }

    .glass {
      background: rgba(255,255,255,.82);
      border: 2px solid rgba(34,197,94,.18);
      border-radius: 24px;
      padding: 16px;
      margin: 16px 0;
      box-shadow: 0 8px 22px rgba(20,83,45,.08);
      backdrop-filter: blur(10px);
    }

    .rules {
      display: grid;
      gap: 10px;
      margin-top: 14px;
      text-align: left;
    }

    .rule {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      background: #f0fdf4;
      padding: 10px;
      border-radius: 16px;
      font-weight: 800;
      color: #25512e;
    }

    .rule span {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--yellow);
      color: #78350f;
      flex: 0 0 auto;
    }

    .primary {
      background: linear-gradient(180deg, #34d399, #16a34a);
      color: #fff;
      box-shadow: 0 7px 0 #15803d, 0 12px 20px rgba(22,163,74,.22);
    }

    .secondary {
      background: #fef3c7;
      color: #7c2d12;
      box-shadow: 0 5px 0 #f59e0b;
    }

    .ghost {
      background: rgba(255,255,255,.84);
      color: #49604a;
      border: 2px solid rgba(20,83,45,.12);
    }

    .danger {
      background: #ef4444;
      color: #fff;
      box-shadow: 0 5px 0 #b91c1c;
    }

    .topline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin: 4px 0 12px;
    }

    .topline-title {
      font-weight: 900;
      color: #166534;
    }

    .counter {
      padding: 8px 12px;
      border-radius: 999px;
      background: #fff7ed;
      border: 2px solid #fed7aa;
      color: #c2410c;
      font-weight: 900;
      white-space: nowrap;
    }

    .scene {
      position: relative;
      height: 280px;
      border-radius: 28px;
      overflow: hidden;
      background: linear-gradient(180deg, #d9f99d, #86efac 52%, #4ade80);
      border: 4px solid rgba(255,255,255,.72);
      box-shadow: 0 14px 28px rgba(20,83,45,.18);
      margin: 8px 0 18px;
    }

    .scene::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 42%;
      background: linear-gradient(180deg, #5b7d2b, #365314);
    }

    .forest-left,
    .forest-right {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 49%;
      z-index: 3;
      background:
        radial-gradient(circle at 35% 15%, #166534 0 16%, transparent 17%),
        radial-gradient(circle at 62% 30%, #15803d 0 18%, transparent 19%),
        linear-gradient(90deg, #14532d, #166534);
    }

    .forest-left {
      left: 0;
      animation: openLeft 7s ease forwards;
    }

    .forest-right {
      right: 0;
      animation: openRight 7s ease forwards;
    }

    @keyframes openLeft {
      0%, 20% { transform: translateX(0); }
      100% { transform: translateX(-92%); }
    }

    @keyframes openRight {
      0%, 20% { transform: translateX(0); }
      100% { transform: translateX(92%); }
    }

    .path {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 110px;
      height: 190px;
      transform: translateX(-50%) perspective(220px) rotateX(58deg);
      transform-origin: bottom;
      background: linear-gradient(#fde68a, #d6a56f);
      z-index: 1;
    }

    .scene-text {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 14px;
      z-index: 7;
      background: rgba(255,255,255,.92);
      border-radius: 18px;
      padding: 12px;
      font-weight: 900;
      color: #14532d;
      opacity: 0;
      animation: textIn .7s ease 5.6s forwards;
    }

    @keyframes textIn {
      to {
        opacity: 1;
        transform: translateY(-4px);
      }
    }

    .log-pile {
      position: absolute;
      left: 50%;
      top: 72px;
      transform: translateX(-50%);
      z-index: 5;
      font-size: 56px;
      letter-spacing: -16px;
      animation: logShake .6s ease 1s 3, logFall 1.5s ease 2.5s forwards;
    }

    @keyframes logShake {
      0%, 100% { transform: translateX(-50%) rotate(0); }
      25% { transform: translateX(-52%) rotate(-3deg); }
      75% { transform: translateX(-48%) rotate(3deg); }
    }

    @keyframes logFall {
      to {
        transform: translate(-50%, 150px) rotate(22deg);
        opacity: 0;
      }
    }

    .river {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 56%;
      z-index: 2;
      background:
        repeating-radial-gradient(ellipse at 20% 40%, rgba(255,255,255,.34) 0 5px, transparent 6px 18px),
        linear-gradient(180deg, #38bdf8, #0369a1);
      animation: waterMove 2s linear infinite;
    }

    @keyframes waterMove {
      50% { background-position: 22px 0, 0 0; }
    }

    .sun-drop {
      position: absolute;
      left: 50%;
      bottom: 24px;
      z-index: 5;
      font-size: 64px;
      transform: translateX(-50%);
      animation: dropUp 3s ease 1.2s forwards, glow 1s ease-in-out infinite;
    }

    @keyframes dropUp {
      0% { bottom: 20px; opacity: .65; }
      75%, 100% { bottom: 142px; opacity: 1; }
    }

    @keyframes glow {
      50% {
        filter: drop-shadow(0 0 18px #fde047);
        transform: translateX(-50%) scale(1.08);
      }
    }

    .boss {
      position: absolute;
      left: 50%;
      top: 50px;
      transform: translateX(-50%);
      z-index: 4;
      font-size: 96px;
      animation: bossHit 2.8s ease 2.2s forwards;
    }

    @keyframes bossHit {
      0% { transform: translateX(-50%); }
      35% { transform: translateX(-50%) scale(1.16); }
      100% {
        transform: translate(240px, -120px) rotate(30deg);
        opacity: 0;
      }
    }

    .energy {
      position: absolute;
      left: 32px;
      bottom: 62px;
      width: 68px;
      height: 68px;
      z-index: 6;
      border-radius: 50%;
      background: radial-gradient(circle, #fff 0 12%, #fde047 20%, #f59e0b 56%, transparent 60%);
      box-shadow: 0 0 26px #facc15;
      animation: energyBlast 2.2s ease 1.4s forwards;
    }

    @keyframes energyBlast {
      0% { transform: scale(.5); }
      50% { transform: translate(140px, -60px) scale(1.3); }
      100% {
        transform: translate(210px, -96px) scale(1.8);
        opacity: 0;
      }
    }

    .mission-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 12px 0;
    }

    .mission-card {
      min-height: 142px;
      border-radius: 22px;
      border: 4px solid #e7e5df;
      background: linear-gradient(180deg, #fff, #f8f5ec);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 12px;
      filter: grayscale(1);
      opacity: .62;
      box-shadow: 0 8px 18px rgba(20,83,45,.09);
      transition: .25s ease;
    }

    .mission-card:last-child {
      grid-column: 1 / -1;
      width: calc(50% - 6px);
      justify-self: center;
    }

    .mission-card.done {
      filter: none;
      opacity: 1;
      transform: translateY(-2px);
    }

    .mission-card.log.done {
      background: linear-gradient(160deg, #fef3c7, #d6a56f);
      border-color: #92400e;
    }

    .mission-card.sun.done {
      background: linear-gradient(160deg, #fff7c2, #facc15);
      border-color: #f59e0b;
    }

    .mission-card.boss-card.done {
      background: linear-gradient(160deg, #fecaca, #f87171);
      border-color: #dc2626;
    }

    .mission-icon {
      font-size: 52px;
    }

    .mission-name {
      font-size: 18px;
      font-weight: 900;
      color: var(--brown);
    }

    .mission-sub {
      margin-top: 4px;
      font-size: 12px;
      font-weight: 800;
      color: #64715f;
    }

    .next-box {
      background: #fff7ed;
      border: 2px solid #fed7aa;
      border-radius: 20px;
      padding: 14px;
      margin: 14px 0;
      color: #9a3412;
      font-weight: 900;
      text-align: center;
    }

    .staff-panel {
      margin-top: 12px;
      padding: 14px;
      border-radius: 22px;
      background: #fff7ed;
      border: 2px solid #fed7aa;
    }

    .staff-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .staff-grid button {
      margin-top: 0;
      padding: 13px;
      font-size: 15px;
      background: #ffedd5;
      color: #9a3412;
      border: 2px solid #fdba74;
      box-shadow: none;
    }

    .staff-grid button.done {
      background: #dcfce7;
      color: #166534;
      border-color: #86efac;
    }

    .name-input {
      width: 100%;
      border: 3px solid #bbf7d0;
      border-radius: 20px;
      padding: 16px;
      font-size: 20px;
      text-align: center;
      font-weight: 900;
      color: #14532d;
      outline: none;
      background: #fff;
      margin: 14px 0;
    }

    .certificate {
      position: relative;
      margin: 18px 0;
      padding: 24px 16px;
      border-radius: 28px;
      background: linear-gradient(180deg, #fffdf0, #fef3c7);
      border: 5px solid #facc15;
      text-align: center;
      box-shadow: 0 12px 24px rgba(146,64,14,.12);
      overflow: hidden;
    }

    .certificate::before,
    .certificate::after {
      content: "✦";
      position: absolute;
      color: rgba(245,158,11,.25);
      font-size: 80px;
    }

    .certificate::before {
      top: -20px;
      left: 10px;
    }

    .certificate::after {
      right: 10px;
      bottom: -32px;
    }

    .cert-label {
      position: relative;
      z-index: 1;
      display: inline-block;
      padding: 6px 14px;
      border-radius: 999px;
      background: #16a34a;
      color: #fff;
      font-weight: 900;
      margin-bottom: 12px;
    }

    .cert-title {
      position: relative;
      z-index: 1;
      color: #92400e;
      font-size: 31px;
      font-weight: 900;
    }

    .cert-name {
      position: relative;
      z-index: 1;
      display: inline-block;
      max-width: 100%;
      margin: 14px 0;
      padding: 4px 18px 6px;
      border-bottom: 4px solid #facc15;
      color: #14532d;
      font-size: 29px;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .stamp {
      position: relative;
      z-index: 1;
      width: 92px;
      height: 92px;
      margin: 16px auto 0;
      border-radius: 50%;
      border: 5px solid #ef4444;
      color: #ef4444;
      display: grid;
      place-items: center;
      font-weight: 900;
      transform: rotate(-10deg);
      background: rgba(255,255,255,.5);
    }

    .confetti {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .confetti span {
      position: absolute;
      top: -30px;
      width: 10px;
      height: 18px;
      border-radius: 3px;
      animation: confettiFall 2.8s linear infinite;
    }

    @keyframes confettiFall {
      to { transform: translateY(110vh) rotate(360deg); }
    }

    .footer {
      margin: auto -18px -18px;
      padding: 15px 18px;
      text-align: center;
      background: #dcfce7;
      color: #166534;
      font-size: 13px;
      font-weight: 900;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 30;
      padding: 16px;
      align-items: center;
      justify-content: center;
      background: rgba(20,30,18,.82);
    }

    .modal.show {
      display: flex;
    }

    .modal-card {
      width: 100%;
      max-width: 450px;
      border-radius: 28px;
      padding: 18px;
      background: #fffef5;
      border: 3px solid rgba(255,255,255,.8);
      box-shadow: 0 22px 60px rgba(0,0,0,.35);
    }

    #reader {
      width: 100%;
      min-height: 290px;
      border-radius: 22px;
      overflow: hidden;
      background: #111;
      border: 4px solid #bbf7d0;
    }

    .scan-note {
      margin: 10px 0 14px;
      padding: 12px;
      border-radius: 18px;
      background: #f0fdf4;
      border: 2px solid #bbf7d0;
      color: #166534;
      font-weight: 800;
      line-height: 1.65;
    }

    @media (max-width: 360px) {
      body {
        padding: 8px;
      }

      .app,
      .screen {
        min-height: calc(100vh - 16px);
      }

      .screen {
        padding: 18px 14px 74px;
      }

      .scene {
        height: 245px;
      }

      .mission-card {
        min-height: 126px;
      }

      .mission-icon {
        font-size: 44px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <div class="leaf one">🌿</div>
    <div class="leaf two">🍃</div>
    <div class="leaf three">🌱</div>

    <button class="admin-button" type="button" aria-label="スタッフ管理" onclick="openStaffLogin()">管理</button>

    <section id="screen" class="screen"></section>
  </main>


  <div id="staffLoginModal" class="modal" aria-hidden="true">
    <div class="modal-card">
      <div class="pill">🔧 スタッフ専用</div>
      <h2>スタッフ管理を開く</h2>

      <div class="scan-note">
        パスワードを入力してください。
      </div>

      <input
        id="staffPasswordInput"
        class="name-input"
        type="password"
        inputmode="numeric"
        maxlength="8"
        placeholder="パスワード"
        onkeydown="if(event.key === 'Enter'){ submitStaffPassword(); }"
      >

      <p
        id="staffPasswordMessage"
        style="
          min-height:1.5em;
          margin:-4px 0 8px;
          text-align:center;
          color:#dc2626;
          font-weight:900;
        "
      ></p>

      <button class="primary" type="button" onclick="submitStaffPassword()">
        管理画面を開く
      </button>

      <button class="ghost" type="button" onclick="closeStaffLogin()">
        閉じる
      </button>
    </div>
  </div>

  <div id="scannerModal" class="modal" aria-hidden="true">
    <div class="modal-card">
      <div class="pill">📷 ミッションQR</div>
      <h2>QRコードを<ruby>読<rt>み</rt></ruby>み<ruby>取<rt>と</rt></ruby>ろう</h2>

      <div class="scan-note">
        ミッションに<ruby>成功<rt>せいこう</rt></ruby>したら、スタッフが<ruby>案内<rt>あんない</rt></ruby>するQRコードをカメラに<ruby>写<rt>うつ</rt></ruby>してね。
      </div>

      <div id="reader"></div>

      <button class="danger" type="button" onclick="closeScanner()">カメラを<ruby>閉<rt>と</rt></ruby>じる</button>
    </div>
  </div>

  <script>
    "use strict";

    const STORAGE_PROGRESS = "wakuwaku_final_progress_v1";
    const STORAGE_NAME = "wakuwaku_final_name_v1";
    const STAFF_PASSWORD = "2026";

    const missions = [
      {
        id: "log",
        name: "<ruby>丸太<rt>まるた</rt></ruby>をどけろ",
        emoji: "🪵",
        qr: "LOG",
        before: "<ruby>目<rt>め</rt></ruby>の<ruby>前<rt>まえ</rt></ruby>に<ruby>大<rt>おお</rt></ruby>きな<ruby>丸太<rt>まるた</rt></ruby>が！<ruby>木<rt>き</rt></ruby>をたおして、ふさがれた<ruby>道<rt>みち</rt></ruby>をあけよう！",
        success: "<ruby>大成功<rt>だいせいこう</rt></ruby>！<ruby>丸太<rt>まるた</rt></ruby>をどかして<ruby>先<rt>さき</rt></ruby>へ<ruby>進<rt>すす</rt></ruby>めるぞ。…ああっ！『<ruby>太陽<rt>たいよう</rt></ruby>のしずく』が<ruby>川<rt>かわ</rt></ruby>の<ruby>底<rt>そこ</rt></ruby>へ！",
        next: "ヨーヨー<ruby>釣<rt>つ</rt></ruby>りブースへ<ruby>移動<rt>いどう</rt></ruby>しよう！",
        scene: "log"
      },
      {
        id: "sun",
        name: "<ruby>太陽<rt>たいよう</rt></ruby>のしずく",
        emoji: "☀️",
        qr: "SUN_DROP",
        before: "ボスの<ruby>部屋<rt>へや</rt></ruby>へ<ruby>続<rt>つづ</rt></ruby>くゲートを<ruby>開<rt>ひら</rt></ruby>く『<ruby>太陽<rt>たいよう</rt></ruby>のしずく』が<ruby>川<rt>かわ</rt></ruby>へ<ruby>落<rt>お</rt></ruby>ちた！<ruby>沈<rt>しず</rt></ruby>む<ruby>前<rt>まえ</rt></ruby>に<ruby>救<rt>すく</rt></ruby>い<ruby>上<rt>あ</rt></ruby>げよう！",
        success: "すごい！<ruby>太陽<rt>たいよう</rt></ruby>のしずくをゲットしたぞ！このエネルギーを<ruby>溜<rt>た</rt></ruby>めて、いざボスバトルだ！",
        next: "<ruby>大画面<rt>だいがめん</rt></ruby>モニターのボタン<ruby>連打<rt>れんだ</rt></ruby>へ<ruby>移動<rt>いどう</rt></ruby>しよう！",
        scene: "sun"
      },
      {
        id: "boss",
        name: "ボスバトル",
        emoji: "👹",
        qr: "BOSS",
        before: "<ruby>最後<rt>さいご</rt></rube>の<ruby>戦<rt>たたか</rt></ruby>い！ボタンを<ruby>連打<rt>れんだ</rt></ruby>してエネルギーを<ruby>溜<rt>た</rt></ruby>め、ジャングルのボスを<ruby>倒<rt>たお</rt></ruby>そう！",
        success: "やったー！ボスを<ruby>倒<rt>たお</rt></ruby>したぞ！おめでとう！ご<ruby>褒美<rt>ほうび</rt></ruby>をもらいに<ruby>行<rt>い</rt></ruby>こう！",
        next: "お<ruby>菓子<rt> かし</rt></ruby>・お<ruby>絵描<rt>えか</rt></ruby>きブースへ<rubyb>行<rt>い</rt></ruby>って、<ruby>最後<rt>さいご</rt></ruby>に<ruby>写真<rt>しゃしん</rt></ruby>を<ruby>撮<rt>と</rt></ruby>ろう！",
        scene: "boss"
      }
    ];

    let completed = loadProgress();
    let playerName = localStorage.getItem(STORAGE_NAME) || "";
    let qrScanner = null;
    let scanning = false;

    const screen = document.getElementById("screen");
    const scannerModal = document.getElementById("scannerModal");
    const staffLoginModal = document.getElementById("staffLoginModal");

    function loadProgress() {
      try {
        const value = JSON.parse(localStorage.getItem(STORAGE_PROGRESS) || "[]");

        if (!Array.isArray(value)) {
          return [];
        }

        return value.filter(id => missions.some(mission => mission.id === id));
      } catch (error) {
        return [];
      }
    }

    function save() {
      localStorage.setItem(STORAGE_PROGRESS, JSON.stringify(completed));
      localStorage.setItem(STORAGE_NAME, playerName);
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function setScreen(content) {
      screen.classList.remove("screen");
      void screen.offsetWidth;
      screen.classList.add("screen");
      screen.innerHTML = content;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderStart() {
      const hasProgress = completed.length > 0;

      setScreen(`
        <div class="hero">
          <div class="pill">🌿 わくなつ2026 🌿</div>

          <h1>
            ワクワクIT<ruby>探検隊<rt>たんけんたい</rt></ruby>
            <br>
            <span style="font-size:.58em">～ジャングルのボスを<ruby>倒<rt>たお</rt></ruby>せ！～</span>
          </h1>

          <div class="hero-icon">📱🌴🧭</div>

          <div class="glass">
            <p><strong>スマホとリアルな<ruby>遊<rt>あそ</rt></ruby>びがつながるジャングル<ruby>冒険<rt>ぼうけん</rt></ruby>ゲーム！</strong></p>

            <div class="rules">
              <div class="rule"><span>1</span><div><ruby>各<rt>かく</rt></ruby>ブースのミッションに<ruby>挑戦<rt>ちょうせん</rt></ruby></div></div>
              <div class="rule"><span>2</span><div><ruby>成功<rt>せいこう</rt></ruby>したらQRコードを<ruby>読<rt>よ</rt></ruby>み<ruby>取<rt>と</rt></ruby>る</div></div>
              <div class="rule"><span>3</span><div>ストーリーを<ruby>進<rt>すす</rt></ruby>めてボスを<ruby>倒<rt>たお</rt></ruby>す</div></div>
            </div>
          </div>

          <button
            class="primary"
            type="button"
            onclick="${hasProgress ? "renderMissionHub()" : "renderOpening()"}"
          >
            ${hasProgress ? "<ruby>続<rt>つづ</rt></ruby>きから<ruby>遊<rt>あそ</rt></ruby>ぶ" : "たんけんスタート！"}
          </button>

          <button
            class="ghost"
            type="button"
            onclick="resetGame()"
          >
            さいしょからやりなおす
          </button>
        </div>
      `);
    }

    function renderOpening() {
      setScreen(`
        <div class="story">
          <div class="pill">🎬 オープニング</div>
          <h2>ジャングルの<ruby>奥<rt>おく</rt></ruby>へ<ruby>進<rt>すす</rt></ruby>もう</h2>

          <div class="scene">
            <div class="forest-left"></div>
            <div class="forest-right"></div>
            <div class="path"></div>
            <div class="scene-text">ザサザサ…<ruby>木々<rt>きぎ</rt></ruby>をかき<ruby>分<rt>わ</rt></ruby>けて、ジャングルの<ruby>奥<rt>おく</rt></ruby>へ！</div>
          </div>

          <div class="glass">
            <p><strong>ジャングルへようこそ！</strong></p>
            <p><ruby>悪<rt>わる</rt></ruby>いボスを<ruby>倒<rt>たお</rt></ruby>しに<ruby>行<rt>い</rt></ruby>こう！</p>
            <p style="margin-top:10px">…ああっ！<ruby>目<rt>め</rt></ruby>の<ruby>前<rt>まえ</rt></ruby>に<ruby>大<rt>おお</rt></ruby>きな<ruby>丸太<rt>まるた</rt></ruby>が！</p>
          </div>

          <button class="primary" type="button" onclick="renderMissionHub()">
            <ruby>缶倒<rt>かんたお</rt></ruby>しブースへGO！
          </button>
        </div>
      `);
    }

    function renderMissionHub() {
      const complete = completed.length === missions.length;
      const nextMission = missions[completed.length] || null;

      setScreen(`
        <div class="topline">
          <div class="topline-title">🌴 ジャングル<ruby>探検中<rt>たんけんたい</rt></ruby></div>
          <div class="counter">${completed.length}/${missions.length} クリア</div>
        </div>

        <h2>ミッションマップ</h2>

        <div class="mission-grid">
          ${missions.map((mission, index) => {
            const done = completed.includes(mission.id);
            const current = index === completed.length;

            return `
              <div class="mission-card ${mission.id === "boss" ? "boss-card" : mission.id} ${done ? "done" : ""}">
                <div>
                  <div class="mission-icon">${mission.emoji}</div>
                  <div class="mission-name">${mission.name}</div>
                  <div class="mission-sub">
                    ${done ? "クリア！" : current ? "<ruby>次<rt>つぎ</rt></ruby>のミッション" : "まだ<ruby>進<rt>すす</rt></ruby>めない"}
                  </div>
                </div>
              </div>
            `;
          }).join("")}
        </div>

        ${
          complete
            ? `
              <div class="next-box">
                🎉 すべてのミッションをクリア！<br>
                ジャングルのボスを<ruby>倒<rt>たお</rt></ruby>したぞ！
              </div>

              <button class="primary" type="button" onclick="renderCertificateForm()">
                <ruby>認定証<rt>にんｔりしょう</rt></ruby>を<ruby>作<rt>つく</rt></ruby>る
              </button>
            `
            : `
              <div class="glass">
                <p><strong>${nextMission.before}</strong></p>
              </div>

              <button class="primary" type="button" onclick="openScanner()">
                📷 <ruby>成功<rt>せいこう</rt></ruby>したらQRを<ruby>読<rt>よ</rt></ruby>み<ruby>取<rt>と</rt></ruby>る
              </button>
            `
        }

        <button class="ghost" type="button" onclick="renderStart()">トップに<ruby>戻<rt>もど</rt></ruby>る</button>

        <div class="footer">
          右下の「管理」はスタッフ用です
        </div>
      `);
    }

    function sceneHtml(scene) {
      if (scene === "log") {
        return `
          <div class="scene">
            <div class="path"></div>
            <div class="log-pile">🪵🪵🪵</div>
            <div class="scene-text">ガラガラガッシャーン！<ruby>丸太<rt>まるた</rt></ruby>が<ruby>崩<rt>くず</rt></ruby>れて<ruby>道<rt>みち</rt></ruby>が<ruby>開<rt>ひら</rt></ruby>いた！</div>
          </div>
        `;
      }

      if (scene === "sun") {
        return `
          <div class="scene">
            <div class="river"></div>
            <div class="sun-drop">☀️</div>
            <div class="scene-text">ザバーン！<ruby>太陽<rt>たいよう</rt></ruby>のしずくを<ruby>救<rt>すく</rt></ruby>い<ruby>上<rt>あ</rt></ruby>げた！</div>
          </div>
        `;
      }

      return `
        <div class="scene">
          <div class="boss">👹</div>
          <div class="energy"></div>
          <div class="scene-text"><ruby>元気玉<rt>げんきだま</rt></ruby>がボスに<ruby>直撃<rt>ちょくげき</rt></ruby>！ボスは<ruby>降参<rt>こうさん</rt></ruby>した！</div>
        </div>
      `;
    }

    function renderSuccess(mission) {
      setScreen(`
        <div class="story">
          <div class="pill">✨ ミッションクリア ✨</div>
          <h2>${mission.name}</h2>

          ${sceneHtml(mission.scene)}

          <div class="glass">
            <p><strong>${mission.success}</strong></p>
          </div>

          <div class="next-box">${mission.next}</div>

          <button class="primary" type="button" onclick="renderMissionHub()">
            ${mission.id === "boss" ? "<ruby>認定証<rt>にんていしょう</rt></ruby>へ<ruby>進<rt>すす</rt></ruby>む" : "<ruby>次<rt>つぎ</rt></ruby>のミッションへ"}
          </button>
        </div>
      `);
    }

    function openScanner() {
      scannerModal.classList.add("show");
      scannerModal.setAttribute("aria-hidden", "false");

      if (!window.Html5Qrcode) {
        alert("QR<ruby>読<rt>よ</rt></ruby>み<ruby>取<rt>と</rt></ruby>りの<ruby>準備<rt>じゅんび</rt></ruby>ができませんでした。ネット<ruby>接続<rt>せつぞく</rt></ruby>を<ruby>確認<rt>かくにん</rt></ruby>してください。");
        closeScanner();
        return;
      }

      if (scanning) {
        return;
      }

      qrScanner = new Html5Qrcode("reader");
      scanning = true;

      qrScanner.start(
        { facingMode: "environment" },
        {
          fps: 10,
          qrbox: { width: 250, height: 250 },
          aspectRatio: 1
        },
        decodedText => {
          const mission = findMission(decodedText);

          if (!mission) {
            alert("このQRコードは<ruby>今回<rt>こんかい</rt></ruby>のミッション<ruby>用<rt>よう</rt></ruby>ではありません。");
            return;
          }

          processScannedMission(mission);
        },
        () => {}
      ).catch(() => {
        alert("カメラを<ruby>起動<rt>きどう</rt></ruby>できませんでした。GitHub PagesなどのHTTPSのURLで<ruby>開<rt>ひら</rt></ruby>き、カメラ<ruby>許可<rt>きょか</rt></ruby>をオンにしてください。");
        closeScanner();
      });
    }

    function closeScanner(callback) {
      scannerModal.classList.remove("show");
      scannerModal.setAttribute("aria-hidden", "true");

      const finish = () => {
        qrScanner = null;
        scanning = false;

        if (typeof callback === "function") {
          callback();
        }
      };

      if (qrScanner && scanning) {
        qrScanner.stop()
          .then(() => {
            qrScanner.clear();
            finish();
          })
          .catch(finish);
      } else {
        finish();
      }
    }

    function findMission(text) {
      const clean = String(text).trim().toUpperCase();

      return missions.find(mission => {
        return clean === mission.qr || clean.includes(mission.qr);
      });
    }

    function processScannedMission(mission) {
      const expected = missions[completed.length];

      if (completed.includes(mission.id)) {
        alert("このミッションはすでにクリアしています。");
        return;
      }

      if (!expected || expected.id !== mission.id) {
        alert(`<ruby>順番<rt>じゅんばん</rt></ruby>が<ruby>違<rt>ちが</rt></ruby>います。<ruby>次<rt>つぎ</rt></ruby>は「${expected ? expected.name : "<ruby>完了<rt>かんりょう</rt></ruby>"}」です。`);
        return;
      }

      completed.push(mission.id);
      save();

      closeScanner(() => {
        renderSuccess(mission);
      });
    }

    function openStaffLogin() {
      const input = document.getElementById("staffPasswordInput");
      const message = document.getElementById("staffPasswordMessage");

      if (input) {
        input.value = "";
      }

      if (message) {
        message.textContent = "";
      }

      staffLoginModal.classList.add("show");
      staffLoginModal.setAttribute("aria-hidden", "false");

      setTimeout(() => {
        if (input) {
          input.focus();
        }
      }, 100);
    }

    function closeStaffLogin() {
      staffLoginModal.classList.remove("show");
      staffLoginModal.setAttribute("aria-hidden", "true");
    }

    function submitStaffPassword() {
      const input = document.getElementById("staffPasswordInput");
      const message = document.getElementById("staffPasswordMessage");

      const rawPassword = input ? input.value : "";
      const password = rawPassword
        .replace(/[０-９]/g, character => {
          return String.fromCharCode(character.charCodeAt(0) - 0xFEE0);
        })
        .replace(/\s+/g, "");

      if (password !== STAFF_PASSWORD) {
        if (message) {
          message.textContent = "パスワードが違います。";
        }

        if (input) {
          input.focus();
          input.select();
        }

        return;
      }

      if (message) {
        message.textContent = "";
      }

      closeStaffLogin();
      renderStaffPanel();
    }

    function renderStaffPanel() {
      const nextMission = missions[completed.length] || null;

      setScreen(`
        <div class="pill">🔧 スタッフ管理</div>
        <h1 style="font-size:32px">ミッション手動登録</h1>

        <div class="staff-panel">
          <p style="text-align:center;font-weight:800">
            QRコードが反応しなかった場合だけ使用してください。
          </p>

          <div class="staff-grid">
            ${missions.map(mission => {
              const done = completed.includes(mission.id);
              const isNext = nextMission && nextMission.id === mission.id;

              return `
                <button
                  class="${done ? "done" : ""}"
                  type="button"
                  onclick="staffToggleMission('${mission.id}')"
                >
                  ${mission.emoji} ${mission.name}<br>
                  ${done ? "<ruby>登録済<rt>とうろくず</rt></ruby>み・タップでここから<ruby>戻<rt>もど</rt></ruby>す" : isNext ? "<ruby>次<rt>つぎ</rt></ruby>に<ruby>登録<rt>とうろく</rt></ruby>できる" : "まだ<ruby>登録<rt>とうろく</rt></ruby>できない"}
                </button>
              `;
            }).join("")}
          </div>
        </div>

        <button class="primary" type="button" onclick="renderMissionHub()">
          ゲーム<ruby>画面<rt>がめん</rt></ruby>
          へ<ruby>戻<rt>もど</rt></ruby>る
        </button>

        <button class="ghost" type="button" onclick="renderStart()">
          トップへ<ruby>戻<rt>もど</rt></ruby>る
        </button>
      `);
    }

    function staffToggleMission(id) {
      const mission = missions.find(item => item.id === id);

      if (!mission) {
        return;
      }

      if (completed.includes(id)) {
        const index = missions.findIndex(item => item.id === id);

        completed = completed.filter(doneId => {
          return missions.findIndex(item => item.id === doneId) < index;
        });

        save();
        renderStaffPanel();
        return;
      }

      const expected = missions[completed.length];

      if (!expected || expected.id !== id) {
        alert(`<ruby>順番<rt>じゅんばん</rt></ruby>に<ruby>登録<rt>とうろく</rt></ruby>してください。<ruby>次<rt>つぎ</rt></ruby>は「${expected ? expected.name : "<ruby>完了<rt>かんりょう</rt></ruby>"}」です。`);
        return;
      }

      completed.push(id);
      save();
      renderStaffPanel();
    }

    function renderCertificateForm() {
      setScreen(`
        <div class="pill">🏆 <ruby>認定証<rt>にんていしょう</rt></ruby>づくり</div>

        <h1>
          <ruby>探検隊<rt>たんけんたい</rt></ruby>の<ruby>
    名前<rt>なまえ</rt></ruby>
       を
          <br>
          <ruby>入<rt>い</rt></ruby>れよう
        </h1>

        <div class="hero-icon" style="text-align:center">✍️</div>

        <div class="glass">
          <p><ruby>名前<rt>なまえ</rt></ruby>を<ruby>入力<rt>にゅうりょく</rt></ruby>すると、きみだけの<ruby>認定証<rt>にんていしょう</rt></ruby>が<ruby>完成<rt>かんせい</rt></ruby>するよ。</p>
        </div>

        <input
          id="nameInput"
          class="name-input"
          maxlength="12"
          placeholder="なまえ"
          value="${escapeHtml(playerName)}"
        >

        <button class="primary" type="button" onclick="createCertificate()">
          <ruby>認定証<rt>にんていしょう</rt></ruby>を<ruby>表示<rt>ひょうじ</rt></ruby>
        </button>

        <button class="ghost" type="button" onclick="renderMissionHub()">
          <ruby>戻<rt>もど</rt></ruby>る
        </button>
      `);
    }

    function createCertificate() {
      const input = document.getElementById("nameInput");

      playerName = input.value.trim() || "<ruby>探検隊<rt>たんけんたい</rt></ruby>";
      save();
      renderCertificate();
    }

    function renderCertificate() {
      setScreen(`
        <div class="pill">🌿 ワクワクIT<ruby>探検隊<rt>たんけんたい</rt></ruby></div>
        <h1><ruby>探検認定証<rt>たんけんにんていしょう</rt></ruby></h1>

        <div class="certificate">
          <div class="cert-label">MISSION COMPLETE</div>
          <div class="cert-title">ジャングル<ruby>探検認定証<rt>たんけんにんていしょう</rt></ruby></div>

          <p style="position:relative;z-index:1">
            あなたは3つのミッションをクリアし、
            <br>
            ジャングルのボスを<ruby>倒<rt>たお</rt></ruby>しました。
          </p>

          <div class="cert-name">${escapeHtml(playerName)}</div>

          <p style="position:relative;z-index:1">
            すばらしい<ruby>勇気<rt>ゆうき</rt></ruby>とチャレンジする力を
            <br>
            ここに<ruby>認定<rt>にんてい</rt></ruby>します。
          </p>

          <p style="position:relative;z-index:1;font-size:36px;margin-top:12px">
            🪵 ☀️ 👹
          </p>

          <div class="stamp"><ruby>認定<rt>にんてい/<rt></ruby></div>
        </div>

        <button class="primary" type="button" onclick="renderClear()">
          クリア<ruby>画面<rt>がめん</rt></ruby>へ
        </button>

        <button class="secondary" type="button" onclick="renderCertificateForm()">
          <ruby>名前<rt>なまえ</rt></ruby>を<ruby>変更<rt>へんこう</rt></ruby>
        </button>
      `);
    }

    function renderClear() {
      const colors = ["#facc15", "#22c55e", "#38bdf8", "#fb923c", "#f472b6"];

      setScreen(`
        <div class="confetti">
          ${Array.from({ length: 28 }).map((_, index) => {
            return `
              <span style="
                left:${Math.random() * 100}%;
                animation-delay:${Math.random() * 2}s;
                background:${colors[index % colors.length]}
              "></span>
            `;
          }).join("")}
        </div>

        <div class="hero">
          <div class="pill">🎉 ミッション<ruby>完了<rt>かんりょう</rt></ruby> 🎉</div>
          <h1>ゲーム<br>クリア！</h1>
          <div class="hero-icon">🏆</div>

          <div class="glass">
            <h2>${escapeHtml(playerName)}</h2>
            <p>ジャングルのボスを<ruby>倒<rt>たお</rt></ruby>したぞ！</p>

            <p style="margin-top:10px">
              <strong>
                お<ruby>菓子<rt>かし</rt></ruby>・お<ruby>絵描<rt>えか</rt></ruby>きブースへ<ruby>行<rt>い</rt></ruby>って、<ruby>最後<rt>さいご</rt></ruby>に<ruby>写真<rt>しゃしん</rt></ruby>を<ruby>撮<rt>と</rt></ruby>ろう！
              </strong>
            </p>
          </div>

          <button class="primary" type="button" onclick="renderStart()">
            トップに<ruby>戻<rt>もど</rt></ruby>る
          </button>

          <button class="ghost" type="button" onclick="resetGame()">
            <ruby>最初<rt>さいしょ</rt></ruby>からやり<ruby>直<rt>なお</rt></ruby>す
          </button>
        </div>
      `);
    }

    function resetGame() {
      completed = [];
      playerName = "";

      localStorage.removeItem(STORAGE_PROGRESS);
      localStorage.removeItem(STORAGE_NAME);

      closeStaffLogin();

      if (scannerModal.classList.contains("show")) {
        closeScanner(() => {
          renderStart();
        });
        return;
      }

      renderStart();
    }

    renderStart();
  </script>
</body>
</html>
